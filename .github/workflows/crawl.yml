name: eomisae-crawler

on:
  # 외부 스케줄러(cron-job.org)가 GitHub API로 이 워크플로우를 호출한다.
  # GitHub 내장 schedule cron은 신뢰성이 낮아 사용하지 않음.
  workflow_dispatch: {}

# 마지막 처리 ID(eomisae_last_id.json)를 레포에 커밋하기 위한 권한
permissions:
  contents: write

# 동시 실행 방지 (상태파일 커밋 충돌 방지)
concurrency:
  group: eomisae-crawler
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # dispatch 시점 SHA가 아닌 실행 시점의 main 최신을 체크아웃.
          # (dispatch 시점 SHA를 쓰면 직전 실행이 푸시한 last_id를 못 봐서 중복 알림 발생)
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run crawler (once)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python script.py --once

      - name: Commit updated state
        run: |
          if [[ -n "$(git status --porcelain eomisae_last_id.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add eomisae_last_id.json
            git commit -m "chore: update last_id [skip ci]"
            git pull --rebase origin main
            git push
          else
            echo "상태 변화 없음 — 커밋 생략"
          fi
